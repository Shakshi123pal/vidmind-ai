version: "3.9"

services:
  videorag:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: videorag:latest
    container_name: videorag-api
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      # Persist FAISS indexes and audio outputs across restarts
      - videorag_indexes:/app/faiss_indexes
      - videorag_audio:/app/audio_outputs
      - videorag_temp:/app/temp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G          # Adjust based on available RAM
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  videorag_indexes:
  videorag_audio:
  videorag_temp:
